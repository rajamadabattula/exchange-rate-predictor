name: Hourly Website Task

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-website-task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ping Streamlit App
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://usdtoinr.streamlit.app/)
          echo "HTTP status: $STATUS"
          exit 0
