name: Hourly Website Task

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-website-task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ping Streamlit App
        run: curl -L -s -o /dev/null -w "%{http_code}\n" https://usdtoinr.streamlit.app/
